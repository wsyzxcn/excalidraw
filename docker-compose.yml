services:
  remote-projects-api:
    build:
      context: .
      dockerfile: services/remote-projects-api/Dockerfile
    container_name: excalidraw-remote-projects-api
    restart: unless-stopped
    environment:
      PORT: 4000
      EXCALIDRAW_PROJECTS_ROOT: /data/projects
    expose:
      - "4000"
    volumes:
      - remote_projects_data:/data/projects

  excalidraw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: excalidraw
    restart: unless-stopped
    depends_on:
      - remote-projects-api
    environment:
      REMOTE_PROJECTS_API_UPSTREAM: http://remote-projects-api:4000
    ports:
      - "3000:80"

volumes:
  remote_projects_data:
